<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings - Fireus Games</title>
    <meta name="description" content="Manage your profile and settings.">
    <link rel="icon" href="fireus.ico" type="image/x-icon">

    <meta property="og:title" content="Settings - Fireus Games">
    <meta property="og:description" content="Manage your profile and settings.">
    <meta property="og:image" content="https://willygc09.github.io/Fireus/fireus.png">
    <meta property="og:url" content="https://willygc09.github.io/Fireus/settings.html">
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="Fireus Games">
    <meta property="og:locale" content="es_ES">

    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Settings - Fireus Games">
    <meta name="twitter:description" content="Manage your profile and settings.">
    <meta name="twitter:image" content="https://willygc09.github.io/Fireus/fireus.png">
    <meta name="twitter:site" content="@FireusGames">
    <meta name="twitter:creator" content="@FireusGames">
    <link rel="canonical" href="https://willygc09.github.io/Fireus/settings.html">

    <link rel="stylesheet" href="style.css">
    <style>
        .profile-card {
            background: #1a1a1a;
            border: 1px solid #333;
            padding: 40px;
            border-radius: 15px;
            max-width: 500px;
            margin: 0 auto;
        }
        .avatar-section {
            margin-bottom: 30px;
            text-align: center;
        }
        .avatar-wrapper {
            position: relative;
            width: 150px;
            height: 150px;
            margin: 0 auto;
            cursor: pointer;
            border-radius: 50%;
            overflow: hidden;
            border: 3px solid #ff2b2b;
            transition: transform 0.2s ease;
        }
        .avatar-wrapper:active {
            transform: scale(0.95);
        }
        #avatar-preview {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: filter 0.3s ease;
            display: block;
        }
        .avatar-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.3s ease;
            color: rgba(255, 255, 255, 0.75);
            font-size: 3rem;
        }
        .avatar-wrapper:hover #avatar-preview {
            filter: brightness(0.5);
        }
        .avatar-wrapper:hover .avatar-overlay {
            opacity: 1;
        }
        .edit-group {
            margin-bottom: 15px;
            text-align: left;
        }
        .edit-group label {
            display: block;
            margin-bottom: 5px;
            color: #888;
            font-size: 0.85em;
        }
        .edit-group input {
            width: 100%;
            padding: 10px;
            background: #0d0d0d;
            border: 1px solid #444;
            color: #fff;
            border-radius: 5px;
            box-sizing: border-box;
        }
        .security-note {
            background: #2a1010;
            padding: 10px;
            border-radius: 5px;
            font-size: 0.8em;
            margin-bottom: 20px;
            color: #ffaaaa;
        }
        .feedback-message {
            margin-top: 10px;
            font-size: 0.85em;
            padding: 8px;
            border-radius: 5px;
            display: none;
            text-align: center;
        }
        .feedback-error { background: #2a1010; color: #ffaaaa; border: 1px solid #441a1a; }
        .feedback-success { background: #102a10; color: #aaffaa; border: 1px solid #1a441a; }
    </style>
</head>
<body>
    <div id="navbar"></div>
    <header><div class="title-container"><h1>Settings</h1></div></header>

    <div class="section">
        <div class="profile-card">
            <div class="avatar-section">
                <div class="avatar-wrapper" id="avatar-wrapper">
                    <img id="avatar-preview" src="fireus.png" alt="Avatar Preview">
                    <div class="avatar-overlay">
                        <span>✎</span>
                    </div>
                </div>
                <input type="file" id="avatar-input" accept="image/*" style="display: none;">
                <div id="avatar-message" class="feedback-message"></div>
            </div>

            <div class="edit-group">
                <label>New username</label>
                <input type="text" id="edit-username" autocomplete="off">
            </div>
            <div class="edit-group">
                <label>New password</label>
                <input type="password" id="edit-password" autocomplete="new-password">
            </div>
            <hr style="border: 0; border-top: 1px solid #333; margin: 20px 0;">
            <div class="edit-group">
                <label>Current password</label>
                <input type="password" id="current-password" required>
            </div>

            <div id="profile-message" class="feedback-message" style="margin-bottom: 15px;"></div>

            <div style="display: flex; gap: 10px;">
                <button id="save-btn" class="button" style="flex: 2;">Save changes</button>
                <a href="profile.html" class="button" style="flex: 1; background-color: #333; text-align: center;">Back</a>
            </div>
        </div>
    </div>
    <script type="module" src="./settings.js"></script>
    <script type="module" src="navbar.js"></script>
</body>
</html>
