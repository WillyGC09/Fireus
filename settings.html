<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fireus Games - Settings</title>
    <meta name="description" content="Manage your profile and settings.">
    <link rel="icon" href="fireus.ico" type="image/x-icon">

    <meta property="og:title" content="Fireus Games - Settings">
    <meta property="og:description" content="Manage your profile and settings.">
    <meta property="og:image" content="https://willygc09.github.io/Fireus/fireus.png">
    <meta property="og:url" content="https://willygc09.github.io/Fireus/settings.html">
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="Fireus Games">
    <meta property="og:locale" content="es_ES">

    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Fireus Games - Settings">
    <meta name="twitter:description" content="Manage your profile and settings.">
    <meta name="twitter:image" content="https://willygc09.github.io/Fireus/fireus.png">
    <meta name="twitter:site" content="@FireusGames">
    <meta name="twitter:creator" content="@FireusGames">
    <link rel="canonical" href="https://willygc09.github.io/Fireus/settings.html">

    <link rel="stylesheet" href="style.css">
    <style>
        .profile-card {
            background: #1a1a1a;
            border: 1px solid #333;
            padding: 40px;
            border-radius: 15px;
            max-width: 500px;
            margin: 0 auto;
        }
        .avatar-section {
            margin-bottom: 30px;
            text-align: center;
        }
        #avatar-preview {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid #ff2b2b;
        }
        .edit-group {
            margin-bottom: 15px;
            text-align: left;
        }
        .edit-group label {
            display: block;
            margin-bottom: 5px;
            color: #888;
            font-size: 0.85em;
        }
        .edit-group input {
            width: 100%;
            padding: 10px;
            background: #0d0d0d;
            border: 1px solid #444;
            color: #fff;
            border-radius: 5px;
            box-sizing: border-box;
        }
        .security-note {
            background: #2a1010;
            padding: 10px;
            border-radius: 5px;
            font-size: 0.8em;
            margin-bottom: 20px;
            color: #ffaaaa;
        }
    </style>
</head>
<body>
    <div id="navbar"></div>
    <header><div class="title-container"><h1>Settings</h1></div></header>

    <div class="section">
        <div class="profile-card">
            <div class="avatar-section">
                <img id="avatar-preview" src="fireus.png">
                <div style="margin-top: 15px;">
                    <input type="file" id="avatar-input" accept="image/*" style="display: none;">
                    <button type="button" onclick="document.getElementById('avatar-input').click()" class="button" style="padding: 5px 15px; font-size: 0.8em;">Change photo</button>
                </div>
            </div>

            <div class="edit-group">
                <label>New username</label>
                <input type="text" id="edit-username">
            </div>
            <div class="edit-group">
                <label>New password (optional)</label>
                <input type="password" id="edit-password">
            </div>
            <hr style="border: 0; border-top: 1px solid #333; margin: 20px 0;">
            <div class="security-note">You must enter your current password to save any changes.</div>
            <div class="edit-group">
                <label>Current password</label>
                <input type="password" id="current-password" required>
            </div>

            <div style="display: flex; gap: 10px;">
                <button id="save-btn" class="button" style="flex: 2;">Save changes</button>
                <a href="profile.html" class="button" style="flex: 1; background-color: #333; text-align: center;">Back</a>
            </div>
        </div>
    </div>
    <script type="module" src="settings.js"></script>
    <script type="module" src="navbar.js"></script>
</body>
</html>
