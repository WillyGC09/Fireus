<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fireus Games - Profile</title>
    <meta name="description" content="Manage your profile and settings.">
    <link rel="icon" href="fireus.ico" type="image/x-icon">

    <meta property="og:title" content="Fireus Games - Profile">
    <meta property="og:description" content="Manage your profile and settings.">
    <meta property="og:image" content="https://willygc09.github.io/Fireus/fireus.png">
    <meta property="og:url" content="https://willygc09.github.io/Fireus/profile.html">
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="Fireus Games">
    <meta property="og:locale" content="es_ES">

    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Fireus Games - Profile">
    <meta name="twitter:description" content="Manage your profile and settings.">
    <meta name="twitter:image" content="https://willygc09.github.io/Fireus/fireus.png">
    <meta name="twitter:site" content="@FireusGames">
    <meta name="twitter:creator" content="@FireusGames">
    <link rel="canonical" href="https://willygc09.github.io/Fireus/profile.html">

    <link rel="stylesheet" href="style.css">
    <style>
        .profile-card {
            background: #1a1a1a;
            border: 1px solid #333;
            padding: 40px;
            border-radius: 15px;
            max-width: 500px;
            margin: 0 auto;
        }
        .profile-display-section {
            margin-bottom: 30px;
            position: relative;
        }
        #display-avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid #ff2b2b;
            background: #000;
        }
        .info-display {
            margin-top: 20px;
        }
        .info-display h2 {
            margin: 5px 0;
            color: #fff;
        }
        .info-display p {
            color: #888;
            margin-bottom: 25px;
        }
    </style>
</head>
<body>
    <div id="navbar"></div>

    <header>
        <div class="title-container">
            <h1>My Account</h1>
        </div>
    </header>

    <div class="section">
        <div class="profile-card">
            <div class="profile-display-section">
                <img id="display-avatar" src="fireus.png" alt="Profile Picture">
                <div class="info-display">
                    <h2 id="display-username">Loading...</h2>
                    <p id="display-email"></p>
                </div>
            </div>

            <div style="display: flex; flex-direction: column; gap: 10px;">
                <a href="settings.html" class="button">Configure data</a>
                <button id="logout-btn" class="button" style="background-color: #333;">Logout</button>
            </div>
        </div>
    </div>

    <footer>
        &copy; 2026 Fireus. All rights reserved.
    </footer>

    <script type="module" src="profile.js"></script>
    <script type="module" src="navbar.js"></script>
</body>
</html>
