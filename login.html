<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fireus Games - Login</title>
    <meta name="description" content="Login to your Fireus Games account.">
    <link rel="icon" href="fireus.ico" type="image/x-icon">

    <meta property="og:title" content="Fireus Games - Login">
    <meta property="og:description" content="Login to your Fireus Games account.">
    <meta property="og:image" content="https://willygc09.github.io/Fireus/fireus.png">
    <meta property="og:url" content="https://willygc09.github.io/Fireus/login.html">
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="Fireus Games">
    <meta property="og:locale" content="es_ES">

    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Fireus Games - Login">
    <meta name="twitter:description" content="Login to your Fireus Games account.">
    <meta name="twitter:image" content="https://willygc09.github.io/Fireus/fireus.png">
    <meta name="twitter:site" content="@FireusGames">
    <meta name="twitter:creator" content="@FireusGames">
    <link rel="canonical" href="https://willygc09.github.io/Fireus/login.html">

    <link rel="stylesheet" href="style.css">
    <style>
        .auth-container {
            max-width: 400px;
            margin: 100px auto;
            padding: 30px;
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 10px;
            text-align: center;
        }
        .auth-container input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            background: #0d0d0d;
            border: 1px solid #444;
            color: #fff;
            border-radius: 5px;
            box-sizing: border-box;
        }
        .auth-container button {
            width: 100%;
            margin-top: 10px;
        }
        .toggle-auth {
            margin-top: 20px;
            font-size: 0.9em;
            color: #888;
        }
        .toggle-auth span {
            color: #ff2b2b;
            cursor: pointer;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div id="navbar"></div>

    <div class="auth-container">
        <h2 id="auth-title">Login</h2>
        <form id="auth-form">
            <input type="text" id="username" placeholder="Username" style="display: none;">
            <input type="email" id="email" placeholder="Email" required>
            <input type="password" id="password" placeholder="Password" required>
            <button type="submit" class="button">Continue</button>
        </form>
        <div class="toggle-auth" id="auth-toggle-text">Don't have an account? <span id="switch-auth">Sign Up</span></div>
    </div>

    <script type="module" src="login.js"></script>
    <script type="module" src="navbar.js"></script>
</body>
</html>
