<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - Fireus Games</title>
    <link rel="icon" href="fireus.ico" type="image/x-icon">
    <link rel="stylesheet" href="style.css">
    <style>
        .auth-container {
            max-width: 400px;
            margin: 100px auto;
            padding: 30px;
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 10px;
            text-align: center;
        }
        .auth-container input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            background: #0d0d0d;
            border: 1px solid #444;
            color: #fff;
            border-radius: 5px;
            box-sizing: border-box;
        }
        .feedback-message {
            margin-top: 15px;
            font-size: 0.85em;
            padding: 10px;
            border-radius: 5px;
            display: none;
        }
        .feedback-error { background: #2a1010; color: #ffaaaa; border: 1px solid #441a1a; }
        .feedback-success { background: #102a10; color: #aaffaa; border: 1px solid #1a441a; }
    </style>
</head>
<body>
    <div class="auth-container">
        <h2>Reset Password</h2>
        <p style="color: #888; font-size: 0.9em; margin-bottom: 20px;">Please enter your new password below.</p>
        <form id="reset-form">
            <input type="password" id="new-password" placeholder="New Password" required minlength="6">
            <input type="password" id="confirm-password" placeholder="Confirm New Password" required minlength="6">
            <button type="submit" class="button" style="width: 100%; margin-top: 10px;">Update Password</button>
        </form>
        <div id="reset-message" class="feedback-message"></div>
    </div>
    <script type="module" src="reset-password.js"></script>
</body>
</html>
